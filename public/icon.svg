<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Gradient definitions for luxury glow -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Shield and Home visual art -->
  <g transform="translate(128, 128)">
    <!-- Glow effect behind -->
    <path d="M 128 16 L 224 56 L 224 136 C 224 200 128 240 128 240 C 128 240 32 200 32 136 L 32 56 Z" fill="url(#glow-grad)" filter="blur(8px)" />
    
    <!-- Shield Outline -->
    <path d="M 128 16 L 224 56 L 224 136 C 224 200 128 240 128 240 C 128 240 32 200 32 136 L 32 56 Z" fill="none" stroke="url(#accent-grad)" stroke-width="12" stroke-linejoin="round" />
    
    <!-- Inner Home Icon inside shield -->
    <path d="M 128 72 L 184 120 L 184 184 L 144 184 L 144 144 L 112 144 L 112 184 L 72 184 L 72 120 Z" fill="url(#accent-grad)" />
    
    <!-- Signal/Alert arcs radiating from home roof representing notifications -->
    <path d="M 96 64 A 48 48 0 0 1 160 64" fill="none" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" />
    <path d="M 72 44 A 80 80 0 0 1 184 44" fill="none" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" stroke-dasharray="4,4" />
  </g>
</svg>
